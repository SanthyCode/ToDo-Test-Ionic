<ion-header>
  <ion-toolbar color="secondary">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tasks"></ion-back-button>
    </ion-buttons>
    <ion-title>Administrar Categorías</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item>
    <ion-input [(ngModel)]="newCategoryName" placeholder="Nueva categoría..."></ion-input>
    <ion-button slot="end" (click)="addCategory()" [disabled]="!newCategoryName">Añadir</ion-button>
  </ion-item>

  <ion-list>
    <ion-item-sliding *ngFor="let cat of categories; trackBy: trackById">
      <ion-item>
        <ion-label>{{ cat.name }}</ion-label>
      </ion-item>
      
      <ion-item-options side="end">
        <ion-item-option color="primary" (click)="editCategory(cat)">Editar</ion-item-option>
        <ion-item-option color="danger" (click)="deleteCategory(cat.id)">Eliminar</ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>
</ion-content>
